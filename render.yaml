services:
  - type: web
    name: arabic-tutor-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: TRIGGER_SECRET
        generateValue: true
      # RENDER_EXTERNAL_URL is auto-injected by Render for web services

  # Morning review: 9AM SGT = 01:00 UTC
  - type: cron
    name: morning-review
    runtime: image
    image:
      url: curlimages/curl:latest
    schedule: "0 1 * * *"
    startCommand: "curl -sf \"$RENDER_EXTERNAL_URL/trigger/morning?secret=$TRIGGER_SECRET\""
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: TRIGGER_SECRET
        fromService:
          name: arabic-tutor-bot
          type: web
          envVarKey: TRIGGER_SECRET

  # Lunch review: 1PM SGT = 05:00 UTC
  - type: cron
    name: lunch-review
    runtime: image
    image:
      url: curlimages/curl:latest
    schedule: "0 5 * * *"
    startCommand: "curl -sf \"$RENDER_EXTERNAL_URL/trigger/lunch?secret=$TRIGGER_SECRET\""
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: TRIGGER_SECRET
        fromService:
          name: arabic-tutor-bot
          type: web
          envVarKey: TRIGGER_SECRET

  # Dinner review: 8PM SGT = 12:00 UTC
  - type: cron
    name: dinner-review
    runtime: image
    image:
      url: curlimages/curl:latest
    schedule: "0 12 * * *"
    startCommand: "curl -sf \"$RENDER_EXTERNAL_URL/trigger/dinner?secret=$TRIGGER_SECRET\""
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: TRIGGER_SECRET
        fromService:
          name: arabic-tutor-bot
          type: web
          envVarKey: TRIGGER_SECRET
