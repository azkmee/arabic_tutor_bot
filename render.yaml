services:
  - type: web
    name: arabic-tutor-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: TRIGGER_SECRET
        generateValue: true
      # RENDER_EXTERNAL_URL is auto-injected by Render for web services

  # Scheduling is handled by GitHub Actions (.github/workflows/scheduled-reviews.yml).
  # The workflow hits /trigger/morning|lunch|dinner on the web service above.
